name: Publish

# Triggered by pushing a tag like `v1.0.0`. Testing already happens in CI
# (ci.yml) on every push/PR, so this workflow does not re-run the test
# suite; it goes straight to publishing `mlex` to crates.io and `mlex` to
# npm, both pinned to the version encoded in the tag. `mlex-node` (the
# NAPI-RS glue crate) is never published to crates.io - only its compiled
# `.node` addon ships, inside the npm package.
#
# Required secrets:
#   CARGO_REGISTRY_TOKEN  - crates.io API token with publish rights.
#   NPM_TOKEN             - npm automation token with publish rights for the
#                            `mlex` package (must have public-package access).
on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "15.0"

jobs:
  publish-crates:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + vendored MLX build
        uses: Swatinem/rust-cache@v2
        with:
          key: mlx-vendor-${{ hashFiles('crates/mlex/vendor/**') }}

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync crate versions to tag
        run: |
          version="${{ steps.version.outputs.version }}"
          # Workspace-level version, inherited by every crate via `version.workspace = true`.
          sed -i '' -E "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          # mlex-node's path dependency on `mlex` also carries an explicit
          # version requirement (required by crates.io-published deps); keep
          # it in lockstep with the workspace version. mlex-node itself is
          # never published (see comment at the top of this workflow).
          sed -i '' -E "s/(path = \"\.\.\/mlex\", version = \")[^\"]*(\")/\1${version}\2/" crates/mlex-node/Cargo.toml
          cat Cargo.toml crates/mlex/Cargo.toml crates/mlex-node/Cargo.toml

      - name: Publish mlex
        working-directory: crates/mlex
        run: cargo publish --allow-dirty --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  publish-npm:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + vendored MLX build
        uses: Swatinem/rust-cache@v2
        with:
          key: mlx-vendor-${{ hashFiles('crates/mlex/vendor/**') }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/node/package-lock.json

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set package.json version
        working-directory: packages/node
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: packages/node
        run: npm ci

      - name: Build native addon (release)
        working-directory: packages/node
        run: npm run build

      - name: Publish to npm
        working-directory: packages/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
