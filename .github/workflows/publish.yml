name: Publish

# Triggered by pushing a tag like `v1.0.0`. Before publishing, this workflow
# runs one release-validation pass against a small, explicit checkpoint set:
# `mlx-community/gemma-4-e2b-it-OptiQ-4bit`,
# `mlx-community/gemma-4-E2B-it-qat-4bit`, and
# `mlx-community/Qwen3.5-2B-OptiQ-4bit`.
# It then publishes `mlex` to crates.io and `mlex` to npm, both pinned to
# the version encoded in the tag. `mlex-node` (the NAPI-RS glue crate) is
# never published to crates.io - only its compiled `.node` addon ships,
# inside the npm package.
#
# Required secrets:
#   HF_TOKEN              - Hugging Face token, used to download test models.
#   CARGO_REGISTRY_TOKEN  - crates.io API token with publish rights.
#   NPM_TOKEN             - npm automation token with publish rights for the
#                            `mlex` package (must have public-package access).
on:
  push:
    tags:
      - "v*.*.*"

env:
  MLEX_MODELS_DIR: ${{ github.workspace }}/.ci-models
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + vendored MLX build
        uses: Swatinem/rust-cache@v2
        with:
          key: mlx-vendor-${{ hashFiles('crates/mlex/vendor/**') }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/node/package-lock.json

      - name: Download publish-validation models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./scripts/ci-download-models.sh "$MLEX_MODELS_DIR" "mlx-community/gemma-4-e2b-it-OptiQ-4bit" "mlx-community/gemma-4-E2B-it-qat-4bit" "mlx-community/Qwen3.5-2B-OptiQ-4bit"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build measure_memory helper
        run: cargo build --release --example measure_memory -p mlex

      - name: Run Rust test suite
        run: cargo test --release -p mlex -- --test-threads=1

      - name: Install Node package dependencies
        working-directory: packages/node
        run: npm ci

      - name: Build native addon
        working-directory: packages/node
        run: npm run build

      - name: Run Node test suite
        working-directory: packages/node
        run: npm test

  publish-crates:
    needs: build-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + vendored MLX build
        uses: Swatinem/rust-cache@v2
        with:
          key: mlx-vendor-${{ hashFiles('crates/mlex/vendor/**') }}

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync crate versions to tag
        run: |
          version="${{ steps.version.outputs.version }}"
          # Workspace-level version, inherited by every crate via `version.workspace = true`.
          sed -i '' -E "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          # mlex-node's path dependency on `mlex` also carries an explicit
          # version requirement (required by crates.io-published deps); keep
          # it in lockstep with the workspace version. mlex-node itself is
          # never published (see comment at the top of this workflow).
          sed -i '' -E "s/(path = \"\.\.\/mlex\", version = \")[^\"]*(\")/\1${version}\2/" crates/mlex-node/Cargo.toml
          cat Cargo.toml crates/mlex/Cargo.toml crates/mlex-node/Cargo.toml

      - name: Publish mlex
        working-directory: crates/mlex
        run: cargo publish --allow-dirty --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  publish-npm:
    needs: build-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + vendored MLX build
        uses: Swatinem/rust-cache@v2
        with:
          key: mlx-vendor-${{ hashFiles('crates/mlex/vendor/**') }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/node/package-lock.json

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set package.json version
        working-directory: packages/node
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: packages/node
        run: npm ci

      - name: Build native addon (release)
        working-directory: packages/node
        run: npm run build

      - name: Publish to npm
        working-directory: packages/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
